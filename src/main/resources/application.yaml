server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

spring:
  application:
    name: reading-garden-kotlin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reading_garden}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:book}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      location: ${SPRING_SERVLET_MULTIPART_LOCATION:/opt/reading-garden/data/images/multipart-temp}
      max-file-size: 10MB
      max-request-size: 10MB
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  pattern:
    dateformat: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX,Asia/Seoul"

app:
  security:
    secret-key: ${APP_SECRET_KEY:${SECRET_KEY:}}
    hs256-key: ${APP_HS256_KEY:${HS256_KEY:}}
  firebase:
    project-id: ${APP_FIREBASE_PROJECT_ID:${FIREBASE_PROJECT_ID:}}
    service-account-file: ${APP_SERVICE_ACCOUNT_FILE:${SERVICE_ACCOUNT_FILE:}}
  email:
    account: ${APP_EMAIL_ACCOUNT:${EMAIL_ACCOUNT:}}
    password: ${APP_EMAIL_PASSWORD:${EMAIL_PASSWORD:}}
  storage:
    images-root: ${APP_STORAGE_IMAGES_ROOT:/opt/reading-garden/data/images}
  integrations:
    aladin-ttbkey: ${APP_ALADIN_TTBKEY:${ALADIN_TTBKEY:}}
