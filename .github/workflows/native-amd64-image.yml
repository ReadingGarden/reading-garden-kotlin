name: native-amd64-image

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-native-amd64:
    runs-on: ubuntu-latest
    env:
      NATIVE_IMAGE_NAME: ghcr.io/readinggarden/reading-garden-kotlin:native-${{ github.sha }}
      REGISTRY_IMAGE: ghcr.io/readinggarden/reading-garden-kotlin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: ./gradlew test

      - name: Build native amd64 image
        run: ./gradlew bootBuildNativeAmd64Image

      - name: Push sha tag
        run: docker push "$NATIVE_IMAGE_NAME"

      - name: Tag latest
        if: github.ref == 'refs/heads/main'
        run: docker tag "$NATIVE_IMAGE_NAME" "$REGISTRY_IMAGE:native-latest"

      - name: Push latest tag
        if: github.ref == 'refs/heads/main'
        run: docker push "$REGISTRY_IMAGE:native-latest"

  deploy-ec2:
    needs: build-native-amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REF: ghcr.io/readinggarden/reading-garden-kotlin:native-${{ github.sha }}
      REMOTE_APP_DIR: /opt/reading-garden
      APP_PORT: ${{ vars.EC2_APP_PORT || '8080' }}
      EC2_PORT: ${{ vars.EC2_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$EC2_PORT" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment manifest
        run: |
          ssh -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p '$REMOTE_APP_DIR'"
          scp -P "$EC2_PORT" deploy/docker-compose.ec2.yml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$REMOTE_APP_DIR/docker-compose.yml"
          scp -P "$EC2_PORT" deploy/cutover-smoke-check.sh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$REMOTE_APP_DIR/cutover-smoke-check.sh"
          ssh -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "chmod +x '$REMOTE_APP_DIR/cutover-smoke-check.sh'"

      - name: Deploy container on EC2
        run: |
          ssh -T -p "$EC2_PORT" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            IMAGE_REF="$IMAGE_REF" APP_PORT="$APP_PORT" REMOTE_APP_DIR="$REMOTE_APP_DIR" /bin/bash -seu <<'EOF'
          set -euo pipefail
          cd "$REMOTE_APP_DIR"
          test -f .env
          test -f secrets/firebase-service-account.json
          PREVIOUS_IMAGE=""
          if docker ps -a --format '{{.Names}}' | grep -qx 'reading-garden'; then
            PREVIOUS_IMAGE="$(docker inspect --format='{{.Config.Image}}' reading-garden)"
          fi
          echo "=== Disk usage before cleanup ==="
          df -h .
          docker system df || true
          docker rm -f reading-garden-debug >/dev/null 2>&1 || true
          docker system prune -af || true
          echo "=== Disk usage after cleanup ==="
          df -h .
          docker system df || true
          export IMAGE_REF="$IMAGE_REF"
          export APP_PORT="$APP_PORT"
          docker compose -f docker-compose.yml pull
          docker compose -f docker-compose.yml up -d
          if ! TIMEOUT_SECONDS=90 ./cutover-smoke-check.sh "http://127.0.0.1:${APP_PORT}"; then
            if [ -n "$PREVIOUS_IMAGE" ]; then
              export IMAGE_REF="$PREVIOUS_IMAGE"
              docker compose -f docker-compose.yml up -d
            fi
            docker system prune -af || true
            exit 1
          fi
          docker system prune -af || true
          EOF
