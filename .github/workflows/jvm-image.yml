name: jvm-image

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  build-arm64:
    needs: test
    runs-on: ubuntu-24.04-arm
    env:
      REGISTRY_IMAGE: ghcr.io/readinggarden/reading-garden-kotlin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:jvm-${{ github.sha }}
            ${{ env.REGISTRY_IMAGE }}:jvm-latest

  deploy-oci:
    needs: build-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REF: ghcr.io/readinggarden/reading-garden-kotlin:jvm-${{ github.sha }}
      REMOTE_APP_DIR: /opt/apps/reading-garden/prod
      OCI_PORT: ${{ vars.OCI_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$OCI_PORT" "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          ssh -p "$OCI_PORT" "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "mkdir -p '$REMOTE_APP_DIR' '/opt/infra/postgresql/init' '/tmp/reading-garden-host-caddy'"
          scp -P "$OCI_PORT" deploy/docker-compose.oci.yml \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/docker-compose.yml"
          scp -P "$OCI_PORT" deploy/docker-compose.postgres-shared.yml \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/opt/infra/postgresql/docker-compose.yml"
          scp -P "$OCI_PORT" deploy/blue-green-deploy.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/blue-green-deploy.sh"
          scp -P "$OCI_PORT" deploy/bootstrap-host-caddy.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/bootstrap-host-caddy.sh"
          scp -P "$OCI_PORT" deploy/bootstrap-shared-postgres.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/bootstrap-shared-postgres.sh"
          scp -P "$OCI_PORT" deploy/render-host-caddy-upstream.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/render-host-caddy-upstream.sh"
          scp -P "$OCI_PORT" deploy/cutover-smoke-check.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/cutover-smoke-check.sh"
          scp -P "$OCI_PORT" deploy/bootstrap-instance.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:$REMOTE_APP_DIR/bootstrap-instance.sh"
          scp -P "$OCI_PORT" deploy/postgres/init/10-create-app-databases.sh \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/opt/infra/postgresql/init/10-create-app-databases.sh"
          scp -r -P "$OCI_PORT" deploy/host-caddy/. \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/tmp/reading-garden-host-caddy/"
          ssh -p "$OCI_PORT" "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "chmod +x \
              '$REMOTE_APP_DIR/blue-green-deploy.sh' \
              '$REMOTE_APP_DIR/bootstrap-host-caddy.sh' \
              '$REMOTE_APP_DIR/bootstrap-shared-postgres.sh' \
              '$REMOTE_APP_DIR/render-host-caddy-upstream.sh' \
              '$REMOTE_APP_DIR/cutover-smoke-check.sh' \
              '$REMOTE_APP_DIR/bootstrap-instance.sh' \
              '/opt/infra/postgresql/init/10-create-app-databases.sh'"

      - name: Deploy with blue-green
        run: |
          ssh -T -p "$OCI_PORT" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            IMAGE_REF="$IMAGE_REF" REMOTE_APP_DIR="$REMOTE_APP_DIR" \
            GHCR_TOKEN="$GHCR_TOKEN" GHCR_USER="$GHCR_USER" \
            /bin/bash -seu <<'EOF'
          set -euo pipefail
          cd "$REMOTE_APP_DIR"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          export APP_HOST_DIR="$REMOTE_APP_DIR"
          export APP_CONTAINER_PREFIX="reading-garden-prod"
          export APP_VOLUME_PREFIX="reading-garden-prod"
          export APP_BLUE_HOST_PORT="18080"
          export APP_GREEN_HOST_PORT="18081"
          export POSTGRES_STACK_DIR="/opt/infra/postgresql"
          export SHARED_BACKEND_NETWORK_NAME="reading-garden-shared-backend"
          export HOST_CADDY_UPSTREAM_FILE="/etc/caddy/upstreams/reading-garden-prod.caddy"
          export ROUTE_RENDERER="$REMOTE_APP_DIR/render-host-caddy-upstream.sh"
          export SMOKE_BASE_URL="https://readinggarden.duckdns.org"

          ./bootstrap-shared-postgres.sh
          ./bootstrap-instance.sh
          sudo HOST_CADDY_STAGE_DIR=/tmp/reading-garden-host-caddy \
            "$REMOTE_APP_DIR/bootstrap-host-caddy.sh"
          test -f .env
          test -f .runtime.env
          test -f secrets/firebase-service-account.json
          ./blue-green-deploy.sh
          EOF
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
