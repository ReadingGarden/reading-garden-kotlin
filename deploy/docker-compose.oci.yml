services:
  caddy:
    image: caddy:2
    container_name: reading-garden-caddy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/caddy-start.sh"]
    environment:
      CADDY_ROUTE_FILE: /etc/caddy/routes/prod-upstream.caddy
      UPSTREAM_WAIT_TIMEOUT_SECONDS: "120"
      UPSTREAM_WAIT_INTERVAL_SECONDS: "2"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /opt/reading-garden/edge/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/reading-garden/edge/routes:/etc/caddy/routes:ro
      - /opt/reading-garden/caddy-start.sh:/usr/local/bin/caddy-start.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app-blue:
        condition: service_healthy
    networks:
      - public

  app-blue:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: reading-garden-blue
    restart: unless-stopped
    pull_policy: always
    expose:
      - "8080"
    env_file:
      - /opt/reading-garden/.env
    volumes:
      - /opt/reading-garden/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
      - /opt/reading-garden/data:/opt/reading-garden/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - public

  app-green:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: reading-garden-green
    restart: unless-stopped
    pull_policy: always
    expose:
      - "8080"
    env_file:
      - /opt/reading-garden/.env
    volumes:
      - /opt/reading-garden/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
      - /opt/reading-garden/data:/opt/reading-garden/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - green
    networks:
      - default
      - public

  postgres:
    image: postgres:17
    container_name: reading-garden-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reading_garden}
      POSTGRES_USER: ${DB_USER:-book}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-book} -d ${DB_NAME:-reading_garden}"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  public:
    external: true
    name: reading-garden-public

volumes:
  pgdata:
  caddy_data:
  caddy_config:
