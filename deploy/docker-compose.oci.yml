services:
  app-blue:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: ${APP_CONTAINER_PREFIX:-reading-garden}-blue
    restart: unless-stopped
    pull_policy: always
    expose:
      - "8080"
    env_file:
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/.env
    volumes:
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/data:/opt/reading-garden/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - public

  app-green:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: ${APP_CONTAINER_PREFIX:-reading-garden}-green
    restart: unless-stopped
    pull_policy: always
    expose:
      - "8080"
    env_file:
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/.env
    volumes:
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
      - ${APP_HOST_DIR:?APP_HOST_DIR is required}/data:/opt/reading-garden/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - public
    profiles:
      - green

  postgres:
    image: postgres:17
    container_name: ${APP_CONTAINER_PREFIX:-reading-garden}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reading_garden}
      POSTGRES_USER: ${DB_USER:-book}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-book} -d ${DB_NAME:-reading_garden}"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  public:
    external: true
    name: reading-garden-public

volumes:
  pgdata:
    name: ${APP_VOLUME_PREFIX:-reading-garden}_pgdata
