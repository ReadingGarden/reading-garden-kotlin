services:
  app:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: reading-garden
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - /opt/reading-garden/.env
    volumes:
      - /opt/reading-garden/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
