services:
  postgres:
    image: postgres:17
    container_name: shared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:?POSTGRES_SUPERUSER is required}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?POSTGRES_SUPERUSER_PASSWORD is required}
      READING_GARDEN_PROD_APP_PASSWORD: ${READING_GARDEN_PROD_APP_PASSWORD:?READING_GARDEN_PROD_APP_PASSWORD is required}
      READING_GARDEN_PROD_MIGRATOR_PASSWORD: ${READING_GARDEN_PROD_MIGRATOR_PASSWORD:?READING_GARDEN_PROD_MIGRATOR_PASSWORD is required}
      READING_GARDEN_DEV_APP_PASSWORD: ${READING_GARDEN_DEV_APP_PASSWORD:?READING_GARDEN_DEV_APP_PASSWORD is required}
      READING_GARDEN_DEV_MIGRATOR_PASSWORD: ${READING_GARDEN_DEV_MIGRATOR_PASSWORD:?READING_GARDEN_DEV_MIGRATOR_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_INIT_DIR:?POSTGRES_INIT_DIR is required}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  shared_postgres_data:
    name: shared_postgres_data
