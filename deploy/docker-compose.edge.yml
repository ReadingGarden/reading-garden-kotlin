services:
  caddy:
    image: caddy:2
    container_name: reading-garden-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /opt/reading-garden/edge/Caddyfile:/etc/caddy/Caddyfile
      - /opt/reading-garden/edge/routes:/etc/caddy/routes:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public

networks:
  public:
    external: true
    name: reading-garden-public

volumes:
  caddy_data:
    external: true
    name: reading-garden_caddy_data
  caddy_config:
    external: true
    name: reading-garden_caddy_config
