global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          env: infra
          service: monitoring
          component: prometheus

  - job_name: reading-garden-dev-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 127.0.0.1:19090
          - 127.0.0.1:19091
        labels:
          env: dev
          service: reading-garden-kotlin
          component: app

  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:2019
        labels:
          env: infra
          service: caddy
          component: caddy

  - job_name: node-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          env: infra
          service: host
          component: host

  - job_name: cadvisor
    static_configs:
      - targets:
          - 127.0.0.1:18082
        labels:
          env: infra
          service: docker
          component: container

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://readinggarden-dev.duckdns.org/api/health
          - https://readinggarden.duckdns.org/api/health
        labels:
          service: reading-garden-kotlin
          component: blackbox
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
