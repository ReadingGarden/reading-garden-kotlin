groups:
  - name: reading-garden-prod
    rules:
      - alert: ProdAppMetricsDown
        expr: sum(up{job="reading-garden-prod-app"}) == 0
        for: 2m
        labels:
          severity: critical
          env: prod
          service: reading-garden-kotlin
          component: app
        annotations:
          summary: ReadingGarden prod actuator metrics target is down
          runbook: Check prod blue/green containers and management port 8081 on the shared backend network.

      - alert: ProdExternalHealthDown
        expr: probe_success{job="blackbox-http",instance="https://readinggarden.duckdns.org/api/health"} == 0
        for: 2m
        labels:
          severity: critical
          env: prod
          service: reading-garden-kotlin
          component: blackbox
        annotations:
          summary: ReadingGarden prod public health probe is failing
          runbook: Check host Caddy, prod upstream, and the public prod health endpoint.
