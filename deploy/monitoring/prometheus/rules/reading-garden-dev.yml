groups:
  - name: reading-garden-dev
    rules:
      - alert: DevAppMetricsDown
        expr: sum(up{job="reading-garden-dev-app"}) == 0
        for: 2m
        labels:
          severity: critical
          env: dev
          service: reading-garden-kotlin
          component: app
        annotations:
          summary: ReadingGarden dev actuator metrics target is down
          runbook: Check dev blue/green containers and management port 8081 on the shared backend network.

      - alert: DevExternalHealthDown
        expr: probe_success{job="blackbox-http",instance="https://readinggarden-dev.duckdns.org/api/health"} == 0
        for: 2m
        labels:
          severity: critical
          env: dev
          service: reading-garden-kotlin
          component: blackbox
        annotations:
          summary: ReadingGarden dev public health probe is failing
          runbook: Check host Caddy, dev upstream, and the public dev health endpoint.

      - alert: CaddyMetricsDown
        expr: up{job="caddy"} == 0
        for: 2m
        labels:
          severity: warning
          env: infra
          service: caddy
          component: caddy
        annotations:
          summary: Caddy metrics target is down
          runbook: Check host Caddy admin metrics on the local admin endpoint.

      - alert: HostDiskAlmostFull
        expr: node_filesystem_avail_bytes{job="node-exporter",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{job="node-exporter",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"} < 0.15
        for: 10m
        labels:
          severity: warning
          env: infra
          service: host
          component: filesystem
        annotations:
          summary: Host root filesystem is above 85 percent usage
          runbook: Inspect disk usage on the Oracle host and prune only after confirming active volumes.

      - alert: HostMemoryHigh
        expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100 > 90
        for: 10m
        labels:
          severity: warning
          env: infra
          service: host
          component: memory
        annotations:
          summary: Host memory usage is above 90 percent
          runbook: Check docker stats and host memory pressure.

      - alert: MonitoringTargetDown
        expr: up{job=~"prometheus|node-exporter|cadvisor|blackbox-http"} == 0
        for: 2m
        labels:
          severity: warning
          env: infra
          service: monitoring
          component: scrape
        annotations:
          summary: A core monitoring scrape target is down
          runbook: Check the monitoring compose stack and Prometheus targets page.
